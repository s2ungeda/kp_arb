# kp-arb 취급 종목 설정 (DESIGN.md §11). 비밀값 아님 — git으로 이력 관리.
# - stock: 국내 주식 종목코드 (도메인 enum과 일치해야 함 — 불일치 시 시동 에러)
# - etf:   단일종목 레버리지 ETF (없으면 생략 — 해당 underlying은 ETF 미취급)
# - hl:    Hyperliquid 빌더 perp 심볼 (dex 접두 포함)
# 주식선물은 월물(만기 있음)이라 여기 적지 않고 시동 시 LS 마스터(t8401)에서 자동 조회.
# ETF는 취급 제외 (사용자 확정 2026-07-13 — 주식·주식선물만. 복귀 시 etf: 줄만 살리면 됨)
symbols:
  samsung:
    stock: "005930"
    # etf: "0193W0"    # KODEX 삼성전자단일종목 (2x) — 미취급
    hl: "xyz:SMSN"
  sk_hynix:
    stock: "000660"
    # etf: "0193T0"    # KODEX SK하이닉스단일 (2x) — 미취급
    hl: "xyz:SKHX"
  hyundai:
    stock: "005380"
    hl: "xyz:HYUNDAI"

# ETF 명목 계산 승수 (외부 #2 노출 보고용, DESIGN §5.7)
etf_leverage: 2.0

# 캐리 이론가 연이자율 (DESIGN §6.1 — 전략 검증하며 조정 예정)
carry_rates:
  stock_futures: 0.035   # 주식선물 이론가 = 기초 현재가 × (1 + r × 잔존일/365)
  fx: 0.015              # 환율이론가 = 원달러선물 × (1 + r × 잔존일/365)

# 왕복 수수료·세금 (명목 대비 비율 — 순진입 계산용. 엑셀 fee 셀(편도)×2 기준, 조정 예정)
fees:
  etf: 0.0007            # HL+주식/ETF 쌍: (0.02% + 0.015%) × 2
  stock_future: 0.00042  # HL+주식선물 쌍: (0.006% + 0.015%) × 2
